<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnUnify — Settings</title>
  <link rel="stylesheet" href="/app.css" />
  <script src="/app.js"></script>
</head>
<body>
  <header>
    <h1>🛡️ VulnUnify</h1>
    <nav id="mainnav"></nav>
    <span id="authBox" class="authbox"></span>
  </header>
  <main>
    <section>
      <h2>Sync schedule</h2>
      <div class="kv" id="scheduler"></div>
    </section>

    <section>
      <h2>SLA policy <span class="muted" style="text-transform:none">— days from first seen, by severity</span></h2>
      <div class="kv" id="sla"></div>
    </section>

    <p class="muted" style="margin-top:24px">
      These are configured via environment variables in <code>.env</code>
      (<code>SYNC_INTERVAL_MINUTES</code>, <code>SLA_*_DAYS</code>) and shown here read-only.</p>
  </main>

  <script>
    const card = (n, l) => `<div class="card"><div class="n">${esc(n)}</div><div class="l">${esc(l)}</div></div>`;

    async function loadSettings() {
      const s = await api("/api/settings");
      const sc = s.scheduler || {};
      document.getElementById("scheduler").innerHTML = [
        card(sc.enabled ? "Enabled" : "Disabled", "Scheduler"),
        card(sc.interval_minutes + " min", "Interval"),
        card(sc.running ? "Yes" : "No", "Running"),
        card(sc.next_run_at ? new Date(sc.next_run_at).toLocaleString() : "—", "Next run"),
      ].join("");
      const sla = s.sla_days || {};
      document.getElementById("sla").innerHTML = ["critical", "high", "medium", "low"]
        .map(k => card((sla[k] ?? "—") + "d", k)).join("");
    }

    requireRole("security").then(loadSettings);
  </script>
</body>
</html>
