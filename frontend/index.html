<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnUnify — Overview</title>
  <link rel="stylesheet" href="/app.css" />
  <script src="/app.js"></script>
  <script src="/vendor/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>🛡️ VulnUnify</h1>
    <nav id="mainnav"></nav>
    <span id="authBox" class="authbox"></span>
    <button id="syncBtn">Sync all connectors</button>
  </header>
  <main>
    <div class="cards" id="cards"></div>

    <section>
      <h2>Overview</h2>
      <div class="charts">
        <div class="chart-card"><h3>Open findings by severity</h3>
          <div class="chart-wrap"><canvas id="severityChart"></canvas></div></div>
        <div class="chart-card"><h3>Finding status</h3>
          <div class="chart-wrap"><canvas id="statusChart"></canvas></div></div>
        <div class="chart-card wide"><h3>SLA posture by severity</h3>
          <div class="chart-wrap"><canvas id="slaChart"></canvas></div></div>
        <div class="chart-card"><h3>Open findings by category</h3>
          <div class="chart-wrap"><canvas id="categoryChart"></canvas></div></div>
        <div class="chart-card wide"><h3>Open findings by source</h3>
          <div class="chart-wrap"><canvas id="sourceChart"></canvas></div></div>
      </div>
    </section>

    <section>
      <h2>Findings</h2>
      <div class="filters">
        <select id="fStatus"><option value="open">Open</option>
          <option value="">All statuses</option>
          <option value="resolved">Resolved</option>
          <option value="accepted_risk">Accepted risk</option>
          <option value="false_positive">False positive</option>
          <option value="snoozed">Snoozed</option></select>
        <select id="fSeverity"><option value="">All severities</option>
          <option>critical</option><option>high</option><option>medium</option>
          <option>low</option><option>info</option></select>
        <select id="fCategory"><option value="">All categories</option>
          <option value="vulnerability">vulnerability</option>
          <option value="cloud_posture">cloud_posture</option>
          <option value="sast">sast</option><option value="sca">sca</option>
          <option value="supply_chain">supply_chain</option><option value="container">container</option>
          <option value="secret">secret</option><option value="iac">iac</option></select>
        <label><input type="checkbox" id="fOverdue" /> SLA breached only</label>
        <input id="fQ" placeholder="search title…" />
      </div>
      <table><thead><tr>
        <th class="sortable" data-sort="severity">Severity<span class="arr"></span></th>
        <th class="sortable" data-sort="status">Status<span class="arr"></span></th>
        <th class="sortable" data-sort="title">Finding<span class="arr"></span></th>
        <th>Asset</th>
        <th class="sortable" data-sort="age">Age<span class="arr"></span></th>
        <th>Assignee</th><th>Triage</th></tr></thead>
        <tbody id="findings"></tbody></table>
    </section>
  </main>

  <div class="modal-overlay" id="fdOverlay">
    <div class="modal detail">
      <div id="fdBody"></div>
      <div class="modal-actions">
        <span class="spacer"></span>
        <button class="mini" data-primary onclick="closeFinding()">Close</button>
      </div>
    </div>
  </div>

  <script>
    // api() and esc() come from /app.js
    const SEV = ["critical", "high", "medium", "low", "info"];
    const SEV_COLOR = {critical:"#e5484d", high:"#f76808", medium:"#f5a623", low:"#3b82f6", info:"#6b7280"};
    Chart.defaults.color = "#8b93a7";
    Chart.defaults.borderColor = "#262b36";
    Chart.defaults.font.family = "system-ui, sans-serif";
    Chart.defaults.plugins.legend.labels.boxWidth = 12;
    window.charts = {};

    function draw(id, config) {
      if (window.charts[id]) window.charts[id].destroy();
      window.charts[id] = new Chart(document.getElementById(id), config);
    }
    const noGrid = { grid: { display: false } };
    const baseBar = { responsive: true, maintainAspectRatio: false,
                      plugins: { legend: { display: false } } };

    function loadCharts(s) {
      draw("severityChart", {
        type: "doughnut",
        data: { labels: SEV.map(x => x[0].toUpperCase() + x.slice(1)),
          datasets: [{ data: SEV.map(x => s.by_severity[x] || 0),
            backgroundColor: SEV.map(x => SEV_COLOR[x]), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: "62%",
          plugins: { legend: { position: "right" } } },
      });
      draw("statusChart", {
        type: "doughnut",
        data: { labels: ["Open", "Resolved", "Suppressed"],
          datasets: [{ data: [s.open_findings, s.resolved_findings, s.suppressed_findings],
            backgroundColor: ["#60a5fa", "#22c55e", "#6b7280"], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: "62%",
          plugins: { legend: { position: "right" } } },
      });
      const breached = SEV.map(x => (s.breached_by_severity || {})[x] || 0);
      const within = SEV.map((x, i) => (s.by_severity[x] || 0) - breached[i]);
      draw("slaChart", {
        type: "bar",
        data: { labels: SEV.map(x => x[0].toUpperCase() + x.slice(1)),
          datasets: [
            { label: "Within SLA", data: within, backgroundColor: "#22c55e", borderRadius: 3 },
            { label: "SLA breached", data: breached, backgroundColor: "#e5484d", borderRadius: 3 },
          ] },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          scales: { x: { stacked: true, ...noGrid }, y: { stacked: true, beginAtZero: true,
            ticks: { precision: 0 } } } },
      });
      const cat = Object.entries(s.by_category);
      draw("categoryChart", {
        type: "bar",
        data: { labels: cat.map(([k]) => k),
          datasets: [{ data: cat.map(([, v]) => v), backgroundColor: "#3b82f6", borderRadius: 3 }] },
        options: { ...baseBar, scales: { x: noGrid, y: { beginAtZero: true, ticks: { precision: 0 } } } },
      });
      const src = Object.entries(s.by_source).sort((a, b) => b[1] - a[1]);
      draw("sourceChart", {
        type: "bar",
        data: { labels: src.map(([k]) => k),
          datasets: [{ data: src.map(([, v]) => v), backgroundColor: "#14b8a6", borderRadius: 3 }] },
        options: { ...baseBar, indexAxis: "y",
          scales: { x: { beginAtZero: true, ticks: { precision: 0 } }, y: noGrid } },
      });
    }

    async function loadStats() {
      const s = await api("/api/stats");
      const sev = s.by_severity || {};
      const cards = [
        ["Open", s.open_findings, false], ["Critical", sev.critical || 0, false],
        ["High", sev.high || 0, false], ["SLA breached", s.sla_breached, true],
        ["Suppressed", s.suppressed_findings, false], ["Resolved", s.resolved_findings, false],
      ];
      document.getElementById("cards").innerHTML = cards.map(
        ([l, n, alert]) => `<div class="card ${alert && n ? 'alert' : ''}">
          <div class="n">${n}</div><div class="l">${l}</div></div>`
      ).join("");
      loadCharts(s);
    }

    const TRIAGE = {active:"— triage —", false_positive:"False positive",
                    accepted_risk:"Accept risk", snoozed:"Snooze 30d"};

    let sortField = "severity", sortOrder = "desc";

    async function loadFindings() {
      const p = new URLSearchParams();
      if (fStatus.value) p.set("effective_status", fStatus.value);
      if (fSeverity.value) p.set("severity", fSeverity.value);
      if (fCategory.value) p.set("category", fCategory.value);
      if (fOverdue.checked) p.set("overdue", "true");
      if (fQ.value) p.set("q", fQ.value);
      p.set("sort", sortField); p.set("order", sortOrder);
      const data = await api("/api/findings?" + p.toString());
      document.getElementById("findings").innerHTML = (data.items || []).map(f => {
        const age = f.age_days == null ? "—" : `${f.age_days}d`;
        const sla = f.sla_breached ? `<span class="pill sla">SLA</span>` : "";
        const opts = Object.entries(TRIAGE).map(([v, l]) =>
          `<option value="${v}" ${v === f.triage_state ? "selected" : ""}>${l}</option>`).join("");
        return `<tr>
          <td><span class="pill sev-${f.severity}">${f.severity}</span></td>
          <td><span class="pill st-${f.effective_status}">${f.effective_status.replace('_',' ')}</span></td>
          <td><span class="link cell-title" title="${esc(f.title)}" onclick="openFinding(${f.id})">${esc(f.title)}</span>
              <div class="f-src">${esc(f.source)}</div></td>
          <td class="muted">${esc(f.asset?.name || f.asset?.identifier)}</td>
          <td>${age}${sla}</td>
          <td>${assigneeCell(f)}</td>
          <td><select onchange="triage(${f.id}, this.value)">${opts}</select></td></tr>`;
      }).join("") || `<tr><td colspan="7" class="muted">No findings — adjust filters or run a sync.</td></tr>`;
      updateSortHeaders();
    }

    function setSort(field) {
      if (sortField === field) sortOrder = sortOrder === "desc" ? "asc" : "desc";
      else { sortField = field; sortOrder = "desc"; }
      loadFindings();
    }
    function updateSortHeaders() {
      document.querySelectorAll("th.sortable").forEach(th => {
        const active = th.dataset.sort === sortField;
        th.classList.toggle("active", active);
        const arr = th.querySelector(".arr");
        if (arr) arr.textContent = active ? (sortOrder === "desc" ? " ↓" : " ↑") : "";
      });
    }

    function assigneeCell(f) {
      if (!window._canAssign) return `<span class="muted">${esc(f.assigned_username || "—")}</span>`;
      const opts = [`<option value="">Unassigned</option>`].concat(
        (window._USERS || []).map(u =>
          `<option value="${u.id}" ${u.id === f.assigned_user_id ? "selected" : ""}>${esc(u.username)}</option>`)
      ).join("");
      return `<select onchange="assignFinding(${f.id}, this.value)">${opts}</select>`;
    }

    async function assignFinding(id, val) {
      await api(`/api/findings/${id}/assign`, { method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: val === "" ? null : Number(val) }) });
      refresh();
    }

    // ---- finding detail modal ----
    const drow = (k, v) => (v == null || v === "")
      ? "" : `<div class="drow"><span class="dk">${esc(k)}</span><span class="dv">${v}</span></div>`;
    const dt = v => v ? new Date(v).toLocaleString() : "";

    async function openFinding(id) {
      const f = await api(`/api/findings/${id}`);
      document.getElementById("fdBody").innerHTML = renderFinding(f);
      document.getElementById("fdOverlay").classList.add("show");
    }
    function closeFinding() {
      document.getElementById("fdOverlay").classList.remove("show");
    }

    function renderFinding(f) {
      const a = f.asset || {};
      const cvss = f.cvss_base_score != null
        ? f.cvss_base_score + (f.cvss_vector ? ` (${esc(f.cvss_vector)})` : "") : "";
      const refs = (f.refs || []).map(u =>
        `<a class="link" href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>`).join("<br>");
      const loc = f.location && Object.keys(f.location).length ? esc(JSON.stringify(f.location)) : "";
      const triage = f.triage_state !== "active"
        ? esc(f.triage_state) + (f.triage_reason ? " — " + esc(f.triage_reason) : "")
          + (f.triaged_by ? " by " + esc(f.triaged_by) : "") : "";
      const block = (label, html) => html
        ? `<div class="dblock"><div class="dk">${esc(label)}</div><div class="dtext">${html}</div></div>` : "";
      return `
        <h3>${esc(f.title)}</h3>
        <div class="dpills">
          <span class="pill sev-${f.severity}">${f.severity}</span>
          <span class="pill st-${f.effective_status}">${f.effective_status.replace('_', ' ')}</span>
          <span class="muted">${esc(f.source)} · ${esc(f.category)}</span>
          ${f.sla_breached ? '<span class="pill sla">SLA</span>' : ''}
        </div>
        <div class="dsec">
          ${drow("Asset", esc(a.name || a.identifier || "—"))}
          ${a.name ? drow("Asset ID", esc(a.identifier)) : ""}
          ${drow("Type", esc(a.asset_type))}
          ${a.cloud_provider ? drow("Cloud", esc(a.cloud_provider) + (a.region ? " / " + esc(a.region) : "")) : ""}
          ${drow("CVEs", esc((f.cve_ids || []).join(", ")))}
          ${drow("CWEs", esc((f.cwe_ids || []).join(", ")))}
          ${drow("CVSS", cvss)}
          ${drow("Location", loc)}
          ${drow("Assignee", esc(f.assigned_username || "unassigned"))}
          ${drow("Age", f.age_days != null ? f.age_days + "d" : "")}
          ${drow("SLA due", dt(f.sla_due_at))}
          ${drow("First seen", dt(f.first_seen))}
          ${drow("Last seen", dt(f.last_seen))}
          ${drow("Resolved", dt(f.resolved_at))}
          ${drow("Source status", esc(f.source_status))}
          ${drow("Triage", triage)}
        </div>
        ${block("Description", esc(f.description))}
        ${block("Remediation", esc(f.remediation))}
        ${block("References", refs)}
        <div class="dblock"><div class="dk">Raw report — ${esc(f.source)}</div>
          <pre class="raw">${esc(JSON.stringify(f.raw, null, 2))}</pre></div>`;
    }

    async function triage(id, state) {
      const body = {state};
      if (state === "snoozed") body.until = new Date(Date.now() + 30*864e5).toISOString();
      if (state !== "active") body.reason = prompt("Reason (optional):") || null;
      await api(`/api/findings/${id}/triage`, {
        method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)});
      refresh();
    }

    function refresh() { loadStats(); loadFindings(); }

    syncBtn.onclick = async () => {
      syncBtn.textContent = "Syncing…"; syncBtn.disabled = true;
      try { await api("/api/sync", { method: "POST" }); } finally {
        syncBtn.textContent = "Sync all connectors"; syncBtn.disabled = false; refresh();
      }
    };
    [fStatus, fSeverity, fCategory].forEach(el => el.onchange = loadFindings);
    fOverdue.onchange = loadFindings;
    fQ.oninput = () => { clearTimeout(window._t); window._t = setTimeout(loadFindings, 300); };
    document.querySelectorAll("th.sortable").forEach(th => th.onclick = () => setSort(th.dataset.sort));

    (async function init() {
      const me = await window.mePromise;
      window._canAssign = me.role !== "dev";
      if (window._canAssign) {
        try { window._USERS = await api("/api/users"); } catch { window._USERS = []; }
      }
      refresh();
    })();
  </script>
</body>
</html>
