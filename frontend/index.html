<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnUnify — Overview</title>
  <link rel="stylesheet" href="/app.css" />
  <script src="/app.js"></script>
  <script src="/vendor/chart.umd.min.js"></script>
</head>
<body>
  <div id="view" data-page="overview" data-title="Overview" data-subtitle="Unified findings across all connected sources">
    <div data-actions>
      <button id="intelBtn" class="btn ghost" title="Refresh CISA KEV + EPSS and rescore risk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.5 4.5 5.5v6c0 4.6 3.2 7.9 7.5 9.4 4.3-1.5 7.5-4.8 7.5-9.4v-6L12 2.5Z"/></svg>Refresh intel</button>
      <button id="syncBtn" class="btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4"/></svg>Sync all connectors</button>
    </div>

    <section class="cards" id="cards"></section>

    <section>
      <h2>Security posture</h2>
      <div class="charts">
        <div class="chart-card"><h3>Open findings by severity</h3>
          <div class="chart-wrap"><canvas id="severityChart"></canvas></div></div>
        <div class="chart-card"><h3>Finding status</h3>
          <div class="chart-wrap"><canvas id="statusChart"></canvas></div></div>
        <div class="chart-card wide"><h3>SLA posture by severity</h3>
          <div class="chart-wrap"><canvas id="slaChart"></canvas></div></div>
        <div class="chart-card"><h3>Open findings by category</h3>
          <div class="chart-wrap"><canvas id="categoryChart"></canvas></div></div>
        <div class="chart-card wide"><h3>Open findings by source</h3>
          <div class="chart-wrap"><canvas id="sourceChart"></canvas></div></div>
      </div>
    </section>

    <section>
      <h2>Findings <span id="dupCaption" class="dup-caption"></span></h2>
      <div class="filters">
        <select id="fStatus"><option value="open">Open</option>
          <option value="">All statuses</option>
          <option value="resolved">Resolved</option>
          <option value="suppressed">Suppressed</option>
          <option value="accepted_risk">Accepted Risk</option>
          <option value="false_positive">False Positive</option>
          <option value="snoozed">Snoozed</option></select>
        <select id="fSeverity"><option value="">All severities</option>
          <option value="critical">Critical</option><option value="high">High</option>
          <option value="medium">Medium</option><option value="low">Low</option>
          <option value="info">Info</option></select>
        <select id="fCategory"><option value="">All categories</option>
          <option value="vulnerability">Vulnerability</option>
          <option value="cloud_posture">Cloud Posture</option>
          <option value="sast">SAST</option><option value="sca">SCA</option>
          <option value="supply_chain">Supply Chain</option><option value="container">Container</option>
          <option value="secret">Secret</option><option value="iac">IAC</option></select>
        <label><input type="checkbox" id="fKev" /> KEV only</label>
        <label><input type="checkbox" id="fOverdue" /> SLA breached only</label>
        <label><input type="checkbox" id="fGroup" /> Group duplicates</label>
        <input id="fQ" placeholder="search title…" />
      </div>
      <div class="table-card">
        <div class="tscroll">
          <table><thead><tr>
            <th></th>
            <th class="sortable" data-sort="risk" title="Composite risk: severity + KEV + EPSS + asset criticality">Risk<span class="arr"></span></th>
            <th class="sortable" data-sort="title">Finding<span class="arr"></span></th>
            <th>Asset</th>
            <th class="sortable" data-sort="severity">Severity<span class="arr"></span></th>
            <th class="sortable" data-sort="status">Status<span class="arr"></span></th>
            <th class="sortable" data-sort="age">Age<span class="arr"></span></th>
            <th>Assignee</th><th>Triage</th></tr></thead>
            <tbody id="findings"></tbody></table>
        </div>
      </div>
      <div class="pager">
        <label class="muted" style="font-size:13px">Per page
          <select id="fPageSize"><option>25</option><option selected>50</option>
            <option>100</option><option>200</option></select></label>
        <span class="spacer"></span>
        <button id="prevPage" class="mini">‹ Prev</button>
        <span id="pageInfo" class="muted"></span>
        <button id="nextPage" class="mini">Next ›</button>
      </div>
    </section>

    <div class="modal-overlay" id="fdOverlay">
      <div class="modal detail">
        <div id="fdBody"></div>
        <div class="modal-actions">
          <span class="spacer"></span>
          <button class="mini" data-primary onclick="closeFinding()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // api() and esc() come from /app.js
    const SEV = ["critical", "high", "medium", "low", "info"];
    // Single source of truth for colors: read the CSS custom properties so the
    // charts always match the pills/palette in app.css.
    const cssVar = (name, fallback) =>
      getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback;
    const SEV_COLOR = { critical: cssVar("--crit"), high: cssVar("--high"),
      medium: cssVar("--med"), low: cssVar("--low"), info: cssVar("--info") };
    const C = { accent: cssVar("--accent"), green: cssVar("--green"), crit: cssVar("--crit"),
      low: cssVar("--low"), info: cssVar("--info"), teal: "#14b8a6" };
    if (window.Chart) {   // chart.umd.min.js may fail to load; don't kill the page
      Chart.defaults.color = cssVar("--muted");
      Chart.defaults.borderColor = cssVar("--line");
      Chart.defaults.font.family = "system-ui, sans-serif";
      Chart.defaults.plugins.legend.labels.boxWidth = 12;
    }
    window.charts = {};

    function draw(id, config) {
      if (window.charts[id]) window.charts[id].destroy();
      window.charts[id] = new Chart(document.getElementById(id), config);
    }
    const noGrid = { grid: { display: false } };
    const baseBar = { responsive: true, maintainAspectRatio: false,
                      plugins: { legend: { display: false } } };

    function loadCharts(s) {
      if (!window.Chart) return;
      s = s || {};
      const bySev = s.by_severity || {}, byCat = s.by_category || {}, bySrc = s.by_source || {};
      draw("severityChart", {
        type: "doughnut",
        data: { labels: SEV.map(x => x[0].toUpperCase() + x.slice(1)),
          datasets: [{ data: SEV.map(x => bySev[x] || 0),
            backgroundColor: SEV.map(x => SEV_COLOR[x]), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: "62%",
          plugins: { legend: { position: "right" } } },
      });
      draw("statusChart", {
        type: "doughnut",
        data: { labels: ["Open", "Resolved", "Suppressed"],
          datasets: [{ data: [s.open_findings, s.resolved_findings, s.suppressed_findings],
            backgroundColor: [C.accent, C.green, C.info], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: "62%",
          plugins: { legend: { position: "right" } } },
      });
      const breached = SEV.map(x => (s.breached_by_severity || {})[x] || 0);
      const within = SEV.map((x, i) => (bySev[x] || 0) - breached[i]);
      draw("slaChart", {
        type: "bar",
        data: { labels: SEV.map(x => x[0].toUpperCase() + x.slice(1)),
          datasets: [
            { label: "Within SLA", data: within, backgroundColor: C.green, borderRadius: 3 },
            { label: "SLA breached", data: breached, backgroundColor: C.crit, borderRadius: 3 },
          ] },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          scales: { x: { stacked: true, ...noGrid }, y: { stacked: true, beginAtZero: true,
            ticks: { precision: 0 } } } },
      });
      const cat = Object.entries(byCat);
      draw("categoryChart", {
        type: "bar",
        data: { labels: cat.map(([k]) => pretty(k)),
          datasets: [{ data: cat.map(([, v]) => v), backgroundColor: C.low, borderRadius: 3 }] },
        options: { ...baseBar, scales: { x: noGrid, y: { beginAtZero: true, ticks: { precision: 0 } } } },
      });
      const src = Object.entries(bySrc).sort((a, b) => b[1] - a[1]);
      draw("sourceChart", {
        type: "bar",
        data: { labels: src.map(([k]) => k),
          datasets: [{ data: src.map(([, v]) => v), backgroundColor: C.teal, borderRadius: 3 }] },
        options: { ...baseBar, indexAxis: "y",
          scales: { x: { beginAtZero: true, ticks: { precision: 0 } }, y: noGrid } },
      });
    }

    // Each card carries the findings filter it applies when clicked.
    const CARD_FILTERS = [
      { status: "open" },
      { status: "open", severity: "critical" },
      { status: "open", severity: "high" },
      { status: "open", kev: true },
      { status: "open", overdue: true },
      { status: "suppressed" },
      { status: "resolved" },
    ];

    async function loadStats() {
      const s = await api("/api/stats");
      const sev = s.by_severity || {};
      const cards = [
        ["Open", s.open_findings, false], ["Critical", sev.critical || 0, false],
        ["High", sev.high || 0, false], ["KEV", s.kev_findings, true],
        ["SLA breached", s.sla_breached, true],
        ["Suppressed", s.suppressed_findings, false], ["Resolved", s.resolved_findings, false],
      ];
      document.getElementById("cards").innerHTML = cards.map(
        ([l, n, isAlert], i) => `<div class="card clickable ${isAlert && n ? 'alert' : ''} ${i === window._activeCard ? 'active' : ''}"
          onclick="applyCardFilter(${i})">
          <div class="n">${n}</div><div class="l">${l}</div></div>`
      ).join("");
      const dupEl = document.getElementById("dupCaption");
      if (dupEl) dupEl.textContent = s.duplicate_findings > 0
        ? `${s.total_findings} findings · ${s.unique_vulnerabilities} unique · ${s.duplicate_findings} duplicate`
        : `${s.total_findings} findings · no duplicates`;
      loadCharts(s);
    }

    function applyCardFilter(i) {
      const flt = CARD_FILTERS[i] || {};
      window._activeCard = i;
      fStatus.value = flt.status || "";
      fSeverity.value = flt.severity || "";
      fCategory.value = "";
      fOverdue.checked = !!flt.overdue;
      fKev.checked = !!flt.kev;
      fQ.value = "";
      page = 0;
      loadStats();        // re-render cards to reflect the active highlight
      loadFindings();
      document.querySelector("#findings").closest("section")
        .scrollIntoView({ behavior: "smooth", block: "start" });
    }

    const TRIAGE = {active:"— triage —", false_positive:"False positive",
                    accepted_risk:"Accept risk", snoozed:"Snooze 30d"};

    // Whole days a breached finding is past its SLA due date (null if not breached).
    function daysOverdue(f) {
      if (!f.sla_breached || !f.sla_due_at) return null;
      return Math.max(0, Math.floor((Date.now() - new Date(f.sla_due_at).getTime()) / 864e5));
    }
    const shortDate = v => v ? new Date(v).toLocaleDateString() : "—";

    let sortField = "risk", sortOrder = "desc", page = 0;
    const pageSize = () => parseInt(fPageSize.value, 10) || 50;

    // Shared filter params (used by both the flat list and the grouped view).
    function buildParams() {
      const p = new URLSearchParams();
      if (fStatus.value) p.set("effective_status", fStatus.value);
      if (fSeverity.value) p.set("severity", fSeverity.value);
      if (fCategory.value) p.set("category", fCategory.value);
      if (fKev.checked) p.set("kev", "true");
      if (fOverdue.checked) p.set("overdue", "true");
      if (fQ.value) p.set("q", fQ.value);
      return p;
    }

    const EMPTY_ROW = `<tr><td colspan="9" class="muted">No findings — adjust filters or run a sync.</td></tr>`;

    // Risk score (0..100) → colored badge by band.
    function riskBadge(score) {
      const s = Math.round(score || 0);
      const band = s >= 80 ? "crit" : s >= 60 ? "high" : s >= 40 ? "med" : s >= 20 ? "low" : "info";
      return `<span class="pill risk risk-${band}" title="composite risk ${s}/100">${s}</span>`;
    }
    const kevPill = ` <span class="pill kev" title="CISA Known Exploited Vulnerability — actively exploited">KEV</span>`;
    const watchPill = ` <span class="pill watch" title="Flagged by a custom watchlist feed">WATCH</span>`;

    // One flat finding row. `indent` styles it as an expanded group member.
    function findingRow(f, indent = false) {
      const age = f.age_days == null ? "—" : `${f.age_days}d`;
      const od = daysOverdue(f);
      // Outside SLA: show just how many days over. Otherwise: show the age.
      const top = od == null ? age
        : `<span class="pill sla" title="SLA due ${fmtDate(f.sla_due_at)}">SLA +${od}d</span>`;
      const opts = Object.entries(TRIAGE).map(([v, l]) =>
        `<option value="${v}" ${v === f.triage_state ? "selected" : ""}>${l}</option>`).join("");
      const asset = f.asset?.name || f.asset?.identifier || "—";
      const ind = indent ? " indent" : "";
      const epss = f.epss_score != null ? ` · EPSS ${(f.epss_score * 100).toFixed(0)}%` : "";
      return `
        <td class="sev-cell"><span class="rail sev-${f.severity}"></span></td>
        <td>${riskBadge(f.risk_score)}</td>
        <td><div class="f-title${ind}"><span class="link cell-title" title="${esc(f.title)}" onclick="openFinding(${f.id})">${esc(f.title)}</span>${f.in_kev ? kevPill : ""}${f.watchlisted ? watchPill : ""}</div>
            <div class="f-sub${ind}"><span class="src">${esc(f.source)}</span> · found ${shortDate(f.first_seen)}${epss}</div></td>
        <td class="mono-cell">${esc(asset)}</td>
        <td><span class="pill sev-${f.severity}">${f.severity}</span></td>
        <td><span class="pill st-${f.effective_status}">${(f.effective_status || "").replace('_', ' ')}</span></td>
        <td>${top}</td>
        <td>${assigneeCell(f)}</td>
        <td><select onchange="triage(${f.id}, this.value)">${opts}</select></td>`;
    }

    async function loadFindings() {
      if (fGroup.checked) return loadGroups();
      const p = buildParams();
      p.set("sort", sortField); p.set("order", sortOrder);
      p.set("limit", pageSize()); p.set("offset", page * pageSize());
      const data = await api("/api/findings?" + p.toString());
      renderPager(data.total || 0, data.limit, data.offset);
      document.getElementById("findings").innerHTML =
        (data.items || []).map(f => `<tr>${findingRow(f)}</tr>`).join("") || EMPTY_ROW;
      updateSortHeaders();
    }

    // Grouped view: correlated duplicates collapse into one expandable row.
    async function loadGroups() {
      const p = buildParams();
      p.set("limit", pageSize()); p.set("offset", page * pageSize());
      const data = await api("/api/findings/groups?" + p.toString());
      renderPager(data.total || 0, data.limit, data.offset);
      document.getElementById("findings").innerHTML =
        (data.items || []).map((g, i) => groupRow(g, i)).join("") || EMPTY_ROW;
      updateSortHeaders();
    }

    function groupRow(g, gi) {
      const multi = g.count > 1;
      const asset = g.members[0]?.asset;
      const assetName = asset?.name || asset?.identifier || "—";
      const caret = multi
        ? `<button class="caret" id="cg${gi}" onclick="toggleGroup(${gi})" title="expand duplicates">▸</button>`
        : `<span class="caret-sp"></span>`;
      const badge = multi
        ? `<span class="dupbadge" title="${g.count} correlated findings">×${g.count}</span>` : "";
      const cveline = g.cve_ids.length ? " · " + esc(g.cve_ids.join(", ")) : "";
      const maxRisk = Math.max(0, ...g.members.map(m => m.risk_score || 0));
      const gkev = (g.members.some(m => m.in_kev) ? kevPill : "")
        + (g.members.some(m => m.watchlisted) ? watchPill : "");
      const head = `<tr class="grp-head">
        <td class="sev-cell"><span class="rail sev-${g.severity}"></span></td>
        <td>${riskBadge(maxRisk)}</td>
        <td><div class="f-title">${caret}<span class="link cell-title" title="${esc(g.title)}" onclick="openFinding(${g.representative_id})">${esc(g.title)}</span>${badge}${gkev}</div>
            <div class="f-sub"><span class="src">${esc(g.sources.join(", "))}</span>${cveline}</div></td>
        <td class="mono-cell">${esc(assetName)}</td>
        <td><span class="pill sev-${g.severity}">${g.severity}</span></td>
        <td><span class="pill st-${g.effective_status}">${(g.effective_status || "").replace('_', ' ')}</span></td>
        <td>${g.first_seen ? shortDate(g.first_seen) : "—"}</td>
        <td class="muted grp-open">${g.open_count}/${g.count} open</td>
        <td></td></tr>`;
      const members = multi
        ? g.members.map(m => `<tr class="grp-member" data-grp="${gi}" hidden>${findingRow(m, true)}</tr>`).join("")
        : "";
      return head + members;
    }

    function toggleGroup(gi) {
      const caret = document.getElementById("cg" + gi);
      const open = caret && caret.textContent === "▸";
      document.querySelectorAll(`tr.grp-member[data-grp="${gi}"]`).forEach(r => (r.hidden = !open));
      if (caret) caret.textContent = open ? "▾" : "▸";
    }

    function renderPager(total, limit, offset) {
      const from = total === 0 ? 0 : offset + 1;
      const to = Math.min(offset + limit, total);
      pageInfo.textContent = `${from}–${to} of ${total}`;
      prevPage.disabled = offset <= 0;
      nextPage.disabled = offset + limit >= total;
    }

    function setSort(field) {
      if (sortField === field) sortOrder = sortOrder === "desc" ? "asc" : "desc";
      else { sortField = field; sortOrder = "desc"; }
      page = 0;
      loadFindings();
    }
    function updateSortHeaders() {
      document.querySelectorAll("th.sortable").forEach(th => {
        const active = th.dataset.sort === sortField;
        th.classList.toggle("active", active);
        const arr = th.querySelector(".arr");
        if (arr) arr.textContent = active ? (sortOrder === "desc" ? " ↓" : " ↑") : "";
      });
    }

    function assigneeCell(f) {
      if (!window._canAssign) return `<span class="muted">${esc(f.assigned_username || "—")}</span>`;
      const opts = [`<option value="">Unassigned</option>`].concat(
        (window._USERS || []).map(u =>
          `<option value="${u.id}" ${u.id === f.assigned_user_id ? "selected" : ""}>${esc(u.username)}</option>`)
      ).join("");
      return `<select onchange="assignFinding(${f.id}, this.value)">${opts}</select>`;
    }

    async function assignFinding(id, val) {
      await api(`/api/findings/${id}/assign`, { method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: val === "" ? null : Number(val) }) });
      refresh();
    }

    // ---- finding detail modal ----
    const drow = (k, v) => (v == null || v === "")
      ? "" : `<div class="drow"><span class="dk">${esc(k)}</span><span class="dv">${v}</span></div>`;
    const dt = v => v ? new Date(v).toLocaleString() : "";

    async function openFinding(id) {
      const f = await api(`/api/findings/${id}`);
      document.getElementById("fdBody").innerHTML = renderFinding(f);
      document.getElementById("fdOverlay").classList.add("show");
    }
    function closeFinding() {
      document.getElementById("fdOverlay").classList.remove("show");
    }

    function renderFinding(f) {
      const a = f.asset || {};
      const od = daysOverdue(f);
      const cvss = f.cvss_base_score != null
        ? f.cvss_base_score + (f.cvss_vector ? ` (${esc(f.cvss_vector)})` : "") : "";
      const refs = (f.refs || []).map(u => /^https?:\/\//i.test(u)   // only http(s); no javascript:
        ? `<a class="link" href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>` : esc(u)).join("<br>");
      const loc = f.location && Object.keys(f.location).length ? esc(JSON.stringify(f.location)) : "";
      const triage = f.triage_state !== "active"
        ? esc(pretty(f.triage_state)) + (f.triage_reason ? " — " + esc(f.triage_reason) : "")
          + (f.triaged_by ? " by " + esc(f.triaged_by) : "") : "";
      const block = (label, html) => html
        ? `<div class="dblock"><div class="dk">${esc(label)}</div><div class="dtext">${html}</div></div>` : "";
      return `
        <h3>${esc(f.title)}</h3>
        <div class="dpills">
          ${riskBadge(f.risk_score)}
          <span class="pill sev-${f.severity}">${f.severity}</span>
          <span class="pill st-${f.effective_status}">${(f.effective_status || "").replace('_', ' ')}</span>
          ${f.in_kev ? '<span class="pill kev" title="CISA Known Exploited Vulnerability">KEV</span>' : ''}
          ${f.watchlisted ? '<span class="pill watch" title="Flagged by a custom watchlist feed">WATCH</span>' : ''}
          <span class="muted">${esc(f.source)} · ${esc(pretty(f.category))}</span>
          ${f.sla_breached ? '<span class="pill sla">SLA</span>' : ''}
        </div>
        <div class="dsec">
          ${drow("Asset", esc(a.name || a.identifier || "—"))}
          ${a.name ? drow("Asset ID", esc(a.identifier)) : ""}
          ${drow("Type", esc(pretty(a.asset_type)))}
          ${a.cloud_provider ? drow("Cloud", esc(a.cloud_provider) + (a.region ? " / " + esc(a.region) : "")) : ""}
          ${drow("Risk score", f.risk_score != null ? Math.round(f.risk_score) + " / 100" : "")}
          ${f.in_kev ? drow("KEV", "Actively exploited — on CISA KEV") : ""}
          ${f.watchlisted ? drow("Watchlist", "Flagged by a custom feed") : ""}
          ${drow("EPSS", f.epss_score != null ? (f.epss_score * 100).toFixed(1) + "% exploit probability" : "")}
          ${drow("CVEs", esc((f.cve_ids || []).join(", ")))}
          ${drow("CWEs", esc((f.cwe_ids || []).join(", ")))}
          ${drow("CVSS", cvss)}
          ${drow("Location", loc)}
          ${drow("Assignee", esc(f.assigned_username || "unassigned"))}
          ${drow("Age", f.age_days != null ? f.age_days + "d" : "")}
          ${drow("SLA due", dt(f.sla_due_at))}
          ${drow("SLA overdue", od != null ? od + " days past due" : "")}
          ${drow("First seen", dt(f.first_seen))}
          ${drow("Last seen", dt(f.last_seen))}
          ${drow("Resolved", dt(f.resolved_at))}
          ${drow("Source status", esc(pretty(f.source_status)))}
          ${drow("Triage", triage)}
        </div>
        ${block("Description", esc(f.description))}
        ${block("Remediation", esc(f.remediation))}
        ${block("References", refs)}
        <div class="dblock"><div class="dk">Raw report — ${esc(f.source)}</div>
          <pre class="raw">${esc(JSON.stringify(f.raw, null, 2))}</pre></div>`;
    }

    async function triage(id, state) {
      const body = {state};
      if (state === "snoozed") body.until = new Date(Date.now() + 30*864e5).toISOString();
      if (state !== "active") body.reason = prompt("Reason (optional):") || null;
      await api(`/api/findings/${id}/triage`, {
        method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)});
      refresh();
    }

    function refresh() { loadStats(); loadFindings(); }

    // A manual filter change resets to page 1 and drops the active-card highlight.
    function onFilterChange() {
      page = 0;
      if (window._activeCard != null) { window._activeCard = null; loadStats(); }
      loadFindings();
    }

    async function refreshIntel() {
      const label = intelBtn.textContent;
      intelBtn.disabled = true; intelBtn.textContent = "Refreshing…";
      try {
        const r = await api("/api/intel/refresh", { method: "POST" });
        toast(`Intel refreshed — ${r.kev} KEV, ${r.epss} EPSS across ${r.cves} CVEs`, "success");
        refresh();
      } finally { intelBtn.disabled = false; intelBtn.textContent = label; }
    }

    syncBtn.onclick = () => syncAll(syncBtn, refresh);
    intelBtn.onclick = refreshIntel;
    [fStatus, fSeverity, fCategory].forEach(el => el.onchange = onFilterChange);
    fOverdue.onchange = onFilterChange;
    fKev.onchange = onFilterChange;
    // Toggling grouping just re-renders the table (keeps filters + active card).
    fGroup.onchange = () => { page = 0; loadFindings(); };
    fQ.oninput = () => { clearTimeout(window._t); window._t = setTimeout(onFilterChange, 300); };
    fPageSize.onchange = () => { page = 0; loadFindings(); };
    prevPage.onclick = () => { if (page > 0) { page--; loadFindings(); } };
    nextPage.onclick = () => { page++; loadFindings(); };
    document.querySelectorAll("th.sortable").forEach(th => th.onclick = () => setSort(th.dataset.sort));

    (async function init() {
      const me = await window.mePromise;
      if (!me) return;   // auth failed; app.js handles the redirect
      window._canAssign = me.role !== "dev";
      if (window._canAssign) {
        try { window._USERS = await api("/api/users"); } catch { window._USERS = []; }
      }
      refresh();
    })();
  </script>
</body>
</html>
