<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnUnify — Sign in</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body class="login">
  <div class="login-card">
    <div class="brand">
      <span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2.5 4.5 5.5v6c0 4.6 3.2 7.9 7.5 9.4 4.3-1.5 7.5-4.8 7.5-9.4v-6L12 2.5Z" fill="currentColor" opacity=".9"/><path d="m8.6 12 2.3 2.3 4.5-4.6" stroke="var(--accent-ink)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="name" style="font-size:16px;font-weight:700">VulnUnify</span>
    </div>
    <h1>Sign in</h1>
    <form id="loginForm">
      <input id="u" placeholder="Username" autocomplete="username" autofocus />
      <input id="p" type="password" placeholder="Password" autocomplete="current-password" />
      <button type="submit">Sign in</button>
      <div id="err" class="err-msg"></div>
    </form>
  </div>
  <script>
    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const err = document.getElementById("err"); err.textContent = "";
      const res = await fetch("/api/auth/login", {
        method: "POST", credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: u.value, password: p.value }),
      });
      if (res.ok) {
        const next = new URLSearchParams(location.search).get("next");
        location.href = next || "/";
      } else {
        err.textContent = "Invalid username or password";
      }
    };
  </script>
</body>
</html>
