<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnUnify — Code Scan</title>
  <link rel="stylesheet" href="/app.css" />
  <script src="/app.js"></script>
</head>
<body>
  <div id="view" data-page="scan" data-title="Code Scan"
       data-subtitle="Clearwing source-code vulnerability hunting · experimental">

    <div id="cwBanner"></div>

    <section>
      <h2>New scan</h2>
      <p class="muted" style="margin-top:-4px">Point Clearwing's <code>sourcehunt</code> pipeline at a
        Git repository. Scans run in the background (minutes&nbsp;to&nbsp;hours) and their findings land in
        the unified <a class="link" href="/">Findings</a> list under source <code>clearwing</code>.</p>
      <div class="filters" style="align-items:flex-end">
        <label style="flex-direction:column;align-items:flex-start;gap:4px">Repository URL
          <input id="repo" style="width:340px" placeholder="https://github.com/org/project" /></label>
        <label style="flex-direction:column;align-items:flex-start;gap:4px">Branch
          <input id="branch" style="width:120px" value="main" /></label>
        <label style="flex-direction:column;align-items:flex-start;gap:4px">Depth
          <select id="depth"><option value="quick">quick</option>
            <option value="standard" selected>standard</option>
            <option value="deep">deep</option></select></label>
        <label style="flex-direction:column;align-items:flex-start;gap:4px">Budget (USD)
          <input id="budget" type="number" min="0" step="1" value="5" style="width:100px" /></label>
        <button class="btn" id="startBtn" onclick="startScan()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3Z"/></svg>Start scan</button>
        <span id="startMsg" class="muted"></span>
      </div>
      <div class="scan-opts">
        <label title="Multi-turn agentic exploit development to confirm real impact (slower, costs more)">
          <input type="checkbox" id="optExploit" /> Exploit development</label>
        <label title="Generate and validate fix patches for confirmed findings">
          <input type="checkbox" id="optPatch" /> Generate patches</label>
        <label title="Open a draft pull request with the patch (requires a git token in the image)">
          <input type="checkbox" id="optPr" /> Draft PR</label>
        <label title="Emit MITRE / HackerOne responsible-disclosure templates">
          <input type="checkbox" id="optDisc" /> Disclosure templates</label>
      </div>
    </section>

    <section id="progressSection" hidden>
      <h2>In progress</h2>
      <div id="progress"></div>
    </section>

    <section>
      <h2>Scans <span class="muted" id="scanCount"></span></h2>
      <div class="table-card">
        <div class="tscroll">
          <table><thead><tr>
            <th>Repository</th><th>Depth</th><th>Status</th><th>Findings</th>
            <th>Cost</th><th>Started</th><th>By</th></tr></thead>
            <tbody id="scans"></tbody></table>
        </div>
      </div>
    </section>

    <div class="modal-overlay" id="scanOverlay">
      <div class="modal detail">
        <div id="scanBody"></div>
        <div class="modal-actions">
          <span class="spacer"></span>
          <button class="mini" data-primary onclick="closeScan()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DOT = { queued: "skip", running: "skip", succeeded: "ok", failed: "err" };

    // The sourcehunt pipeline, in order. Clearwing's stage events map onto these;
    // a couple of names are aliased to the step they belong to.
    const STAGES = [
      { key: "clone", label: "Clone" }, { key: "preprocess", label: "Preprocess" },
      { key: "rank", label: "Rank" }, { key: "hunt", label: "Hunt" },
      { key: "verify", label: "Verify" }, { key: "exploit", label: "Exploit" },
      { key: "report", label: "Report" },
    ];
    const STAGE_ALIAS = { scan: "preprocess", subsystem_hunt: "hunt" };
    const stageIndex = stage =>
      STAGES.findIndex(s => s.key === (STAGE_ALIAS[stage] || stage));

    const isLive = s => s.status === "queued" || s.status === "running";

    function elapsed(startIso) {
      if (!startIso) return "";
      const secs = Math.max(0, Math.floor((Date.now() - new Date(startIso).getTime()) / 1000));
      const m = Math.floor(secs / 60), s = secs % 60;
      return m ? `${m}m ${s}s` : `${s}s`;
    }

    // ---- live progress cards ----
    function progressCard(s) {
      const idx = s.status === "queued" ? -1 : stageIndex(s.stage);
      const steps = STAGES.map((st, i) => {
        const cls = idx < 0 ? "" : i < idx ? "done" : i === idx ? "active" : "";
        return `<div class="step ${cls}"><span class="sdot"></span><span class="slabel">${st.label}</span></div>`;
      }).join("");
      const activity = s.activity ? esc(s.activity)
        : (s.status === "queued" ? "waiting to start…" : "working…");
      const metrics = [
        s.findings_count ? `${s.findings_count} findings` : null,
        s.cost_usd ? "$" + s.cost_usd.toFixed(2) : null,
        s.files_ranked ? `${s.files_ranked} files` : null,
      ].filter(Boolean).join(" · ");
      return `<div class="progress-card">
        <div class="pc-head">
          <span class="pc-repo" title="${esc(s.repo_url)}">${esc(s.repo_url)}</span>
          <span class="muted">${esc(s.branch)} · ${esc(s.depth)}</span>
          <span class="spacer"></span>
          <span class="muted" data-elapsed="${esc(s.started_at || "")}">${elapsed(s.started_at)}</span>
        </div>
        <div class="stepper">${steps}</div>
        <div class="pc-activity"><span class="spin"></span><span>${activity}</span></div>
        ${metrics ? `<div class="pc-metrics muted">${metrics}</div>` : ""}
      </div>`;
    }

    function renderProgress(scans) {
      const live = scans.filter(isLive);
      const sec = document.getElementById("progressSection");
      sec.hidden = live.length === 0;
      document.getElementById("progress").innerHTML = live.map(progressCard).join("");
    }

    // Tick the elapsed clocks every second so running scans feel alive.
    setInterval(() => {
      document.querySelectorAll("[data-elapsed]").forEach(el => {
        const start = el.getAttribute("data-elapsed");
        if (start) el.textContent = elapsed(start);
      });
    }, 1000);

    function statusCell(s) {
      const stage = s.status === "running" && s.stage
        ? ` <span class="muted">· ${esc(s.stage)}</span>` : "";
      return `<span class="dot ${DOT[s.status] || "off"}"></span>${esc(s.status)}${stage}`
        + (s.status === "failed" && s.error ? ` <span class="link" title="${esc(s.error)}">why?</span>` : "");
    }

    async function loadScans() {
      const scans = await api("/api/clearwing/scans");
      renderProgress(scans);
      renderRows("scans", scans, s => `<tr class="clickable" onclick="openScan(${s.id})">
        <td><div class="f-title" style="max-width:360px;overflow:hidden;text-overflow:ellipsis">${esc(s.repo_url)}</div>
            <div class="f-sub"><span class="src">${esc(s.branch)}</span></div></td>
        <td class="mono-cell">${esc(s.depth)}</td>
        <td>${statusCell(s)}</td>
        <td class="num">${s.findings_count}${s.verified_count ? ` <span class="muted">(${s.verified_count}✓)</span>` : ""}</td>
        <td class="num">${s.cost_usd ? "$" + s.cost_usd.toFixed(2) : "—"}</td>
        <td class="muted">${s.started_at ? esc(fmtDate(s.started_at)) : "queued"}</td>
        <td>${esc(s.username || "—")}</td></tr>`,
        { colspan: 7, empty: "No scans yet — start one above.", countEl: "scanCount" });
      // Poll quickly while anything is live so progress feels responsive.
      clearTimeout(window._pollT);
      if (scans.some(isLive)) window._pollT = setTimeout(loadScans, 2000);
    }

    // ---- scan detail modal ----
    async function openScan(id) {
      const s = await api(`/api/clearwing/scans/${id}`);
      document.getElementById("scanBody").innerHTML = renderScanDetail(s);
      document.getElementById("scanOverlay").classList.add("show");
    }
    function closeScan() { document.getElementById("scanOverlay").classList.remove("show"); }

    function renderScanDetail(s) {
      const row = (k, v) => (v == null || v === "")
        ? "" : `<div class="drow"><span class="dk">${esc(k)}</span><span class="dv">${v}</span></div>`;
      const stPill = s.status === "succeeded" ? "resolved" : s.status === "failed" ? "open" : "snoozed";
      const dl = (label, kind, present) => present
        ? `<a class="btn mini" href="/api/clearwing/scans/${s.id}/${kind}" download>${label}</a>` : "";
      const opts = [s.exploit && "exploit dev", s.auto_patch && "auto-patch",
                    s.auto_pr && "draft PR", s.disclosures && "disclosures"]
                    .filter(Boolean).join(", ") || "discovery only";
      return `
        <h3 style="word-break:break-all">${esc(s.repo_url)}</h3>
        <div class="dpills">
          <span class="pill st-${stPill}">${esc(s.status)}</span>
          <span class="muted">${esc(s.branch)} · ${esc(s.depth)} · ${esc(opts)}</span>
        </div>
        <div class="dsec">
          ${row("Findings", s.findings_count)}
          ${row("Verified", s.verified_count || "")}
          ${row("Exploited", s.exploited_count || "")}
          ${row("Files ranked / hunted", `${s.files_ranked} / ${s.files_hunted}`)}
          ${row("Exit code", s.exit_code == null ? "" : s.exit_code)}
          ${row("Tokens", s.tokens_used ? s.tokens_used.toLocaleString() : "")}
          ${row("Cost", s.cost_usd ? "$" + s.cost_usd.toFixed(2) : "$0.00")}
          ${row("Duration", s.duration_seconds ? s.duration_seconds.toFixed(1) + "s" : "")}
          ${row("Session", s.session_id ? `<span class="mono">${esc(s.session_id)}</span>` : "")}
          ${row("Started", s.started_at ? fmtDate(s.started_at) : "")}
          ${row("Finished", s.finished_at ? fmtDate(s.finished_at) : "")}
        </div>
        ${s.error ? `<div class="dblock"><div class="dk">Error</div>
          <div class="dtext" style="color:var(--crit)">${esc(s.error)}</div></div>` : ""}
        <div class="dblock"><div class="dk">Reports</div><div class="dtext">
          ${dl("⬇ SARIF", "sarif", s.has_sarif)} ${dl("⬇ Markdown report", "report", s.has_report)}
          ${!s.has_sarif && !s.has_report ? '<span class="muted">no report artifacts</span>' : ""}
        </div></div>`;
    }

    async function startScan() {
      const msg = document.getElementById("startMsg"); msg.textContent = "";
      const repo = document.getElementById("repo").value.trim();
      if (!repo) { msg.textContent = "enter a repository URL"; return; }
      const body = {
        repo_url: repo,
        branch: document.getElementById("branch").value.trim() || "main",
        depth: document.getElementById("depth").value,
        budget_usd: parseFloat(document.getElementById("budget").value) || 0,
        exploit: document.getElementById("optExploit").checked,
        auto_patch: document.getElementById("optPatch").checked,
        auto_pr: document.getElementById("optPr").checked,
        disclosures: document.getElementById("optDisc").checked,
      };
      const btn = document.getElementById("startBtn"); btn.disabled = true;
      const r = await apiTry("/api/clearwing/scan", { method: "POST", json: body });
      btn.disabled = false;
      if (r.ok) { document.getElementById("repo").value = ""; toast("Scan queued", "success"); loadScans(); }
      else { msg.textContent = detailOf(r.body, "could not start scan"); }
    }

    async function checkAvailable() {
      let st; try { st = await api("/api/clearwing/status"); } catch { return; }
      const el = document.getElementById("cwBanner");
      const box = (html) => `<div class="card" style="border-color:color-mix(in srgb,var(--warn) 45%,var(--border));padding:12px 16px">${html}</div>`;
      if (!st.available) {
        el.innerHTML = box(`<b>Clearwing isn't installed in this environment.</b>
          <span class="muted">You can queue scans, but they'll fail until the <code>clearwing</code> library is
          available in the API image.</span>`);
      } else if (!st.key_configured) {
        el.innerHTML = box(`<b>No LLM key set.</b>
          <span class="muted">Scans still run the static pass, but LLM hunting/exploit/patch need an Anthropic key
          (or an OpenAI-compatible endpoint) set on the <a class="link" href="/connectors.html">Connectors</a> page.</span>`);
      }
    }

    requireRole("security").then(() => { checkAvailable(); loadScans(); });
  </script>
</body>
</html>
