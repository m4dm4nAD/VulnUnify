<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnUnify — Users</title>
  <link rel="stylesheet" href="/app.css" />
  <script src="/app.js"></script>
</head>
<body>
  <header>
    <h1>🛡️ VulnUnify</h1>
    <nav id="mainnav"></nav>
    <span id="authBox" class="authbox"></span>
  </header>
  <main>
    <section>
      <h2>Add user</h2>
      <div class="filters">
        <input id="nuUser" placeholder="username" autocomplete="off" />
        <input id="nuEmail" placeholder="email (optional)" autocomplete="off" />
        <input id="nuPass" type="password" placeholder="password" autocomplete="new-password" />
        <select id="nuRole">
          <option value="dev">dev</option>
          <option value="security_user">security_user</option>
          <option value="security_admin">security_admin</option>
        </select>
        <button class="mini" data-primary id="nuAdd" onclick="addUser()">Create</button>
        <span id="nuErr" class="muted"></span>
      </div>
    </section>

    <section>
      <h2>Users</h2>
      <table><thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Active</th>
        <th>Created</th><th></th></tr></thead>
        <tbody id="users"></tbody></table>
    </section>
  </main>

  <script>
    const ROLES = ["dev", "security_user", "security_admin"];

    async function loadUsers() {
      const users = await api("/api/users");
      renderRows("users", users, u => {
        // data-* + delegated listeners (below) avoid inline onclick, which
        // breaks/injects on names containing quotes.
        const roleSel = `<select data-act="role" data-id="${u.id}">${
          ROLES.map(r => `<option value="${r}" ${r === u.role ? "selected" : ""}>${r}</option>`).join("")}</select>`;
        const self = window.ME && window.ME.id === u.id;
        return `<tr>
          <td>${esc(u.username)}${self ? ' <span class="muted">(you)</span>' : ""}</td>
          <td class="muted">${esc(u.email || "—")}</td>
          <td>${roleSel}</td>
          <td>${u.is_active ? "yes" : '<span class="muted">no</span>'}</td>
          <td class="muted">${u.created_at ? esc(fmtDate(u.created_at)) : "—"}</td>
          <td><div class="row-actions">
            <button class="mini" data-act="resetpw" data-id="${u.id}" data-name="${esc(u.username)}">Reset password</button>
            <button class="mini" data-act="toggle" data-id="${u.id}" data-active="${!u.is_active}">${u.is_active ? "Deactivate" : "Activate"}</button>
            ${self ? "" : `<button class="mini" data-act="del" data-id="${u.id}" data-name="${esc(u.username)}">Delete</button>`}
          </div></td></tr>`;
      }, { colspan: 6, empty: "No users." });
    }

    // Delegated row actions (buttons + role <select>).
    const usersBody = document.getElementById("users");
    usersBody.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const { act, id, name } = btn.dataset;
      if (act === "resetpw") resetPw(+id, name);
      else if (act === "toggle") toggleActive(+id, btn.dataset.active === "true");
      else if (act === "del") delUser(+id, name);
    });
    usersBody.addEventListener("change", (e) => {
      const sel = e.target.closest("select[data-act='role']");
      if (sel) changeRole(+sel.dataset.id, sel.value);
    });

    async function addUser() {
      const err = document.getElementById("nuErr"); err.textContent = "";
      const body = { username: nuUser.value.trim(), email: nuEmail.value.trim() || null,
                     password: nuPass.value, role: nuRole.value };
      if (!body.username || !body.password) { err.textContent = "username and password required"; return; }
      const r = await apiTry("/api/users", { method: "POST", json: body });
      if (r.ok) { nuUser.value = nuEmail.value = nuPass.value = ""; loadUsers(); }
      else { err.textContent = r.status === 409 ? "username already exists"
             : detailOf(r.body, "could not create user"); }
    }

    async function changeRole(id, role) {
      const r = await apiTry(`/api/users/${id}`, { method: "PATCH", json: { role } });
      if (!r.ok) toast(detailOf(r.body, "could not change role"));
      loadUsers();
    }

    async function toggleActive(id, active) {
      const r = await apiTry(`/api/users/${id}`, { method: "PATCH", json: { is_active: active } });
      if (!r.ok) toast(detailOf(r.body, "could not update user"));
      loadUsers();
    }

    async function resetPw(id, name) {
      const pw = prompt(`New password for ${name}:`);
      if (!pw) return;
      const r = await apiTry(`/api/users/${id}/password`, { method: "POST", json: { password: pw } });
      toast(r.ok ? "Password updated." : detailOf(r.body, "could not update password"),
            r.ok ? "success" : "error");
    }

    async function delUser(id, name) {
      if (!confirm(`Delete ${name}? Their assigned findings become unassigned.`)) return;
      const r = await apiTry(`/api/users/${id}`, { method: "DELETE" });
      if (!r.ok) toast(detailOf(r.body, "could not delete"));
      loadUsers();
    }

    requireRole("admin").then(loadUsers);
  </script>
</body>
</html>
