services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vulnunify
      POSTGRES_PASSWORD: vulnunify
      POSTGRES_DB: vulnunify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnunify"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Run migrations then boot the API.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      # slim image has no curl/wget; use the interpreter that's already here.
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    # NOTE: No source bind-mount for live reload. The project path contains a
    # ':' (".../VS:Cursor Projects/...") and Docker rejects bind sources with a
    # colon. Code is baked in via the Dockerfile COPY; rebuild to pick up
    # backend changes:  docker compose up -d --build

volumes:
  pgdata:
